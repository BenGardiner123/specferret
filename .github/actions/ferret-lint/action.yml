name: "SpecFerret Lint CI"
description: "Run ferret lint --ci with deterministic outputs and artifact capture"
author: "SpecFerret"

inputs:
  baseline-mode:
    description: "CI baseline strategy: committed or rebuild"
    required: false
    default: "committed"
  bun-version:
    description: "Bun version to install"
    required: false
    default: "1.3.11"
  install-command:
    description: "Command used to install the ferret CLI"
    required: false
    default: "bun install -g @specferret/cli"
  working-directory:
    description: "Directory where ferret lint --ci should run"
    required: false
    default: "."
  include-suggestions:
    description: "Include import suggestions in CI output"
    required: false
    default: "false"
  artifact-name:
    description: "Artifact name for captured lint JSON"
    required: false
    default: "ferret-lint-ci"

outputs:
  exit-code:
    description: "ferret lint --ci exit code"
    value: ${{ steps.parse.outputs.exit_code }}
  consistent:
    description: "Whether the contract graph is consistent"
    value: ${{ steps.parse.outputs.consistent }}
  breaking:
    description: "Direct breaking count"
    value: ${{ steps.parse.outputs.breaking }}
  non-breaking:
    description: "Transitive/non-breaking count"
    value: ${{ steps.parse.outputs.non_breaking }}
  flagged:
    description: "Flagged item count"
    value: ${{ steps.parse.outputs.flagged }}
  output-json-path:
    description: "Path to captured ferret lint JSON output"
    value: ${{ steps.run_ferret.outputs.output_json_path }}
  output-stderr-path:
    description: "Path to captured ferret lint stderr output"
    value: ${{ steps.run_ferret.outputs.output_stderr_path }}

runs:
  using: "composite"
  steps:
    - name: Setup Bun
      uses: oven-sh/setup-bun@v2
      with:
        bun-version: ${{ inputs.bun-version }}

    - name: Install ferret CLI
      shell: bash
      run: ${{ inputs.install-command }}

    - name: Run ferret lint --ci
      id: run_ferret
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: |
        set +e
        OUTPUT_JSON="$RUNNER_TEMP/ferret-lint-ci.json"
        OUTPUT_STDERR="$RUNNER_TEMP/ferret-lint-ci.stderr.txt"

        if [ "${{ inputs.baseline-mode }}" != "committed" ] && [ "${{ inputs.baseline-mode }}" != "rebuild" ]; then
          echo "ferret-action: invalid baseline-mode '${{ inputs.baseline-mode }}' (use committed or rebuild)" > "$OUTPUT_STDERR"
          echo '{}' > "$OUTPUT_JSON"
          echo "output_json_path=$OUTPUT_JSON" >> "$GITHUB_OUTPUT"
          echo "output_stderr_path=$OUTPUT_STDERR" >> "$GITHUB_OUTPUT"
          echo "exit_code=2" >> "$GITHUB_OUTPUT"
          exit 0
        fi

        if ! command -v ferret >/dev/null 2>&1; then
          echo "ferret-action: ferret command not found after install-command" > "$OUTPUT_STDERR"
          echo '{}' > "$OUTPUT_JSON"
          echo "output_json_path=$OUTPUT_JSON" >> "$GITHUB_OUTPUT"
          echo "output_stderr_path=$OUTPUT_STDERR" >> "$GITHUB_OUTPUT"
          echo "exit_code=2" >> "$GITHUB_OUTPUT"
          exit 0
        fi

        EXTRA_ARGS=""
        if [ "${{ inputs.include-suggestions }}" = "true" ]; then
          EXTRA_ARGS="--ci-suggestions"
        fi

        ferret lint --ci --ci-baseline "${{ inputs.baseline-mode }}" $EXTRA_ARGS > "$OUTPUT_JSON" 2> "$OUTPUT_STDERR"
        EXIT_CODE=$?

        echo "output_json_path=$OUTPUT_JSON" >> "$GITHUB_OUTPUT"
        echo "output_stderr_path=$OUTPUT_STDERR" >> "$GITHUB_OUTPUT"
        echo "exit_code=$EXIT_CODE" >> "$GITHUB_OUTPUT"

    - name: Parse CI JSON and set outputs
      id: parse
      shell: bash
      run: |
        bun -e '
          const fs = require("node:fs");
          const outputPath = process.env.OUTPUT_PATH;
          const stderrPath = process.env.STDERR_PATH;
          const exitCode = process.env.EXIT_CODE;
          const githubOutput = process.env.GITHUB_OUTPUT;
          const summaryPath = process.env.GITHUB_STEP_SUMMARY;

          const text = fs.readFileSync(outputPath, "utf8");
          const stderrText = fs.existsSync(stderrPath)
            ? fs.readFileSync(stderrPath, "utf8").trim()
            : "";

          let parsed;
          let parseError = "";
          try {
            parsed = JSON.parse(text);
          } catch (error) {
            parsed = {};
            parseError = String(error);
          }

          const flaggedCount = Array.isArray(parsed.flagged) ? parsed.flagged.length : 0;
          const hasParseError = parseError.length > 0;

          const out = [
            `exit_code=${exitCode}`,
            `consistent=${hasParseError ? "false" : String(Boolean(parsed.consistent))}`,
            `breaking=${String(parsed.breaking ?? 0)}`,
            `non_breaking=${String(parsed.nonBreaking ?? 0)}`,
            `flagged=${String(flaggedCount)}`,
          ].join("\\n") + "\\n";

          fs.appendFileSync(githubOutput, out);

          const summary = [
            "### SpecFerret CI Result",
            "",
            `- consistent: ${hasParseError ? "false" : String(Boolean(parsed.consistent))}`,
            `- breaking: ${String(parsed.breaking ?? 0)}`,
            `- non-breaking: ${String(parsed.nonBreaking ?? 0)}`,
            `- flagged: ${String(flaggedCount)}`,
            `- exit code: ${exitCode}`,
          ].join("\\n") + "\\n";

          fs.appendFileSync(summaryPath, summary);

          if (hasParseError) {
            fs.appendFileSync(
              summaryPath,
              [``, `#### Parser warning`, `- ferret JSON parse failed: ${parseError}`].join("\\n") + "\\n",
            );
          }

          if (stderrText.length > 0) {
            fs.appendFileSync(
              summaryPath,
              [``, `#### ferret stderr`, "```text", stderrText, "```"].join("\\n") + "\\n",
            );
          }
        '
      env:
        OUTPUT_PATH: ${{ steps.run_ferret.outputs.output_json_path }}
        STDERR_PATH: ${{ steps.run_ferret.outputs.output_stderr_path }}
        EXIT_CODE: ${{ steps.run_ferret.outputs.exit_code }}

    - name: Upload ferret CI JSON artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ inputs.artifact-name }}
        path: ${{ steps.run_ferret.outputs.output_json_path }}

    - name: Upload ferret CI stderr artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ inputs.artifact-name }}-stderr
        path: ${{ steps.run_ferret.outputs.output_stderr_path }}

    - name: Enforce drift gate
      shell: bash
      run: |
        if [ "${{ steps.run_ferret.outputs.exit_code }}" != "0" ]; then
          exit "${{ steps.run_ferret.outputs.exit_code }}"
        fi
