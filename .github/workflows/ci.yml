name: CI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - run: npm install

      - run: npm run build

      - run: npm test

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - run: npm install

      - run: npm run build

      - name: Smoke test compiled CLI
        run: node packages/cli/dist/bin/ferret.js --version

      - name: Performance gate
        run: |
          mkdir -p /tmp/ferret-gate
          cd /tmp/ferret-gate
          node $GITHUB_WORKSPACE/packages/cli/dist/bin/ferret.js init --no-hook
          start=$(node -e 'console.log(Date.now())')
          output=$(node $GITHUB_WORKSPACE/packages/cli/dist/bin/ferret.js lint)
          end=$(node -e 'console.log(Date.now())')
          elapsed=$((end - start))
          printf '%s\n' "$output"
          echo "wall-clock: ${elapsed}ms"
          if [ "$elapsed" -ge 500 ]; then
            echo "ferret lint exceeded 500ms wall clock gate"
            exit 1
          fi
