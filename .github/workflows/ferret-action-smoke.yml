name: Ferret Action Smoke

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
    paths:
      - ".github/actions/ferret-lint/**"
      - "docs/ci-templates/**"
      - "README.md"

jobs:
  smoke:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        mode: [single-package, monorepo, pr-only]
    steps:
      - uses: actions/checkout@v4

      - name: Run local SpecFerret action
        uses: ./.github/actions/ferret-lint
        with:
          baseline-mode: rebuild
          artifact-name: ferret-lint-ci-${{ matrix.mode }}
